<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamil Rogalski</title>
</head>
<style>
body {
    font-family: Verdana, Tahoma, sans-serif;
}

table {
    left: 50%;
    border-collapse: collapse;
    border: 1px solid #bdc3c7;
    box-shadow: 2px 2px 12px rgba(0, 0, 0, 0.2), -1px -1px 8px rgba(0, 0, 0, 0.2);
}

tr {
    transition: all .2s ease-in;
    cursor: pointer;
}

th, td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid #ddd;
}

tr:hover {
    background-color: #f5f5f5;
    transform: scale(1.02);
    box-shadow: 2px 2px 12px rgba(0, 0, 0, 0.2), -1px -1px 8px rgba(0, 0, 0, 0.2);
}
</style>

<script>

let x = "X";
let y = " ";

function parzysta(a){
    if(a % 2 == 0){
        tablica_parzyste.push(parseInt(a));
        return x;
    }
    else{
        return y;
    }


}
function nieparzysta(a){
    if (a % 2 != 0){
        tablica_nieparzyste.push(parseInt(a));
        return x;
    }
    else{
        return y;
    }
    
}

function pierwsza(a){
    p=0;
    for(var k=1; k<=a; k++){
		    if(a%k==0){
                p++;
            }
		    
	    }
    if(p==2){
        tablica_pierwsze.push(parseInt(a));
        return x;
    }
    else{
        return y;
    }
    
}

var tablica_parzyste = [];
var tablica_nieparzyste = [];
var tablica_pierwsze = [];




document.write("<table>");
    document.write("<tr>");
        document.write("<th>" + "Lp." + "</th>");
        document.write("<th>" + "Losowane" + "</th>");
        document.write("<th>" + "Parzysta" + "</th>");
        document.write("<th>" + "Nieparzysta" + "</th>");
        document.write("<th>" + "Pierwsza" + "</th>");
    document.write("</tr>");

    for (let i=1; i<=30; i++) {
        let a = Math.round(Math.random()*100+1);
            document.write("<tr>");
                document.write("<td>" + i + "</td>");
                document.write("<td>" + a + "</td>");
                document.write("<td>" + parzysta(a) + "</td>");
                document.write("<td>" + nieparzysta(a) + "</td>");
                document.write("<td>" + pierwsza(a) + "</td>");
            document.write("</tr>");
    }
document.write("</table>");

document.write("<br>");
document.write("<br>");

console.log(tablica_parzyste.sort());
tablica_nieparzyste.sort();
tablica_pierwsze.sort();

var ilosc_parzyste = tablica_parzyste.length;
var ilosc_nieparzyste = tablica_nieparzyste.length;
var ilosc_pierwsze = tablica_pierwsze.length;

document.write("<table>");
    document.write("<tr>");
        document.write("<th>" + "Największa parzysta" + "</th>");
        document.write("<th>" + "Liczba parzystych" + "</th>");
        document.write("<th>" + "Największa nieparzysta " + "</th>");
        document.write("<th>" + "Liczba nieparzystych" + "</th>");
        document.write("<th>" + "Największa pierwsza" + "</th>");
        document.write("<th>" + "Liczba pierwszych" + "</th>");
    document.write("</tr>");

    document.write("<tr>");
        document.write("<td>" + tablica_parzyste[ilosc_parzyste - 1] + "</td>");
        document.write("<td>" + ilosc_parzyste + "</td>");
        document.write("<td>" + tablica_nieparzyste[ilosc_nieparzyste - 1] + "</td>");
        document.write("<td>" + ilosc_nieparzyste + "</td>");
        document.write("<td>" + tablica_pierwsze[ilosc_pierwsze - 1] + "</td>");
        document.write("<td>" + ilosc_pierwsze + "</td>");
    document.write("</tr>");

document.write("</table>");

//    + tablica_parzyste[ilosc_parzyste - 1] 
</script>
<body>
    
</body>
</html>
